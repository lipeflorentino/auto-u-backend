version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-u-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - CLOUD_PROVIDER=LOCAL
    volumes:
      - .:/app
    networks:
      - auto-u-network

networks:
  auto-u-network:
    driver: bridge
