name: Deploy Pipeline - Multi-Cloud

on:
  push:
    branches: [ master ]

jobs:
  deploy-gcp:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      # O Makefile abstrai os comandos gcloud e docker tag/push
      - name: Build and Deploy GCP
        run: make deploy-gcp GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

  deploy-aws:
    name: Deploy to AWS App Runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      # O Makefile cuida do login no ECR e push da imagem
      - name: Build and Deploy AWS (Mock/Draft)
        run: make deploy-aws AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}